<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media — Damsith</title>
    <style>
        body {
            background: #ffffff;
            color: #1a1a1a;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 19px;
            line-height: 1.7;
            margin: 0;
            padding: 60px 40px 80px;
            max-width: 680px;
            margin: 0 auto;
        }

        .back {
            display: inline-block;
            font-size: 15px;
            color: #1a1a1a;
            text-decoration: none;
            opacity: 0.5;
            margin-bottom: 48px;
        }

        .back:hover {
            opacity: 1;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 40px 0;
            letter-spacing: -0.2px;
        }

        .media-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .media-list li {
            border-top: 1px solid #d8d0c8;
            padding: 18px 0;
        }

        .media-list li:last-child {
            border-bottom: 1px solid #d8d0c8;
        }

        .media-list a {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .media-list a:hover {
            opacity: 0.6;
        }

        .media-title {
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }
